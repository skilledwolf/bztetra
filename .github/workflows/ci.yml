name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Ruff
        run: python -m ruff check src/bztetra tests
      - name: Pytest
        run: python -m pytest -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[docs]'
      - name: Build docs
        run: python -m mkdocs build --strict

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build --sdist --wheel
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Install wheel smoke test
        run: |
          python -m venv .pkg-venv
          . .pkg-venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python - <<'PY'
          import bztetra

          assert bztetra.__version__ != "0+unknown"
          assert hasattr(bztetra, "density_of_states_weights")
          PY

  legacy-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install compiler toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes gfortran
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package, dev dependencies, and PyPI legacy wrapper
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install libtetrabz
      - name: Legacy shell parity and wrapper parity tests
        run: python -m pytest -q tests/test_legacy_shell_matrix.py tests/test_legacy_wrapper_parity.py
