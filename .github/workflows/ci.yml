name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Ruff
        run: python -m ruff check src/tetrabz tests
      - name: Pytest
        run: python -m pytest -q

  legacy-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install compiler toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes gfortran
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package, dev dependencies, and legacy wrapper
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip install -e ./libtetra_original/python
      - name: Legacy parity tests
        run: python -m pytest -q tests/test_legacy_shell_matrix.py tests/test_legacy_wrapper_parity.py
