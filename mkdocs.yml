site_name: bztetra
site_description: Python and Numba tetrahedron integration on regular k-grids
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            members_order: source
            merge_init_into_class: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Examples: examples.md
  - Validation: validation.md
