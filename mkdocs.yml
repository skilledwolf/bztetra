site_name: bztetra
site_description: Python and Numba tetrahedron integration on regular k-grids
site_url: https://skilledwolf.github.io/bztetra/
repo_url: https://github.com/skilledwolf/bztetra
repo_name: skilledwolf/bztetra
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            members_order: source
            merge_init_into_class: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false

nav:
  - Home: index.md
  - Physics Guide: physics.md
  - 2D Triangle Method: two_dimensional_plan.md
  - Examples: examples.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Validation: validation.md
